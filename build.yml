name: Build & Release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dll
          path: bin/Release/net8.0/Jellyfin.Plugin.XtreamCodes.dll
          retention-days: 7

  # ── Package & Release ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (Release)
        run: dotnet build --configuration Release

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create zip package
        run: |
          mkdir -p dist
          cp bin/Release/net8.0/Jellyfin.Plugin.XtreamCodes.dll dist/
          cd dist
          zip -r "../Jellyfin.Plugin.XtreamCodes_${{ steps.version.outputs.VERSION }}.zip" Jellyfin.Plugin.XtreamCodes.dll

      - name: Compute MD5 checksum
        id: checksum
        run: |
          MD5=$(md5sum "Jellyfin.Plugin.XtreamCodes_${{ steps.version.outputs.VERSION }}.zip" | awk '{print $1}')
          echo "MD5=${MD5}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          MD5=${{ steps.checksum.outputs.MD5 }}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}"

          # Use Python for reliable JSON manipulation
          python3 - <<EOF
          import json, sys

          with open('manifest.json') as f:
              manifest = json.load(f)

          new_entry = {
              "changelog": f"## v{VERSION}\n- See CHANGELOG.md for details",
              "checksum": "${MD5}",
              "sourceUrl": f"${REPO}/releases/download/v{VERSION}/Jellyfin.Plugin.XtreamCodes_{VERSION}.zip",
              "targetAbi": "10.9.0.0",
              "timestamp": "${DATE}",
              "version": VERSION
          }

          manifest[0]["versions"].insert(0, new_entry)

          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print(f"Updated manifest for v{VERSION}")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jellyfin.Plugin.XtreamCodes_${{ steps.version.outputs.VERSION }}.zip
            manifest.json
          body: |
            ## Jellyfin Plugin — Xtream Codes Live TV v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Copy `Jellyfin.Plugin.XtreamCodes_${{ steps.version.outputs.VERSION }}.zip` to your Jellyfin plugins folder and unzip.
            2. Or add this repo URL to your Jellyfin plugin catalogue.
            3. Restart Jellyfin and configure the plugin under Dashboard → Plugins.

            **Checksum (MD5):** `${{ steps.checksum.outputs.MD5 }}`
